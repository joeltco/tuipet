name: release

# Validates that a version tag builds cleanly. Publishing to PyPI is done by
# tools/deploy.sh (local, token in ~/.pypirc), so this workflow does NOT publish —
# it's a green "the tag builds + metadata is valid" gate.
#
# To switch to token-free CI publishing later: set up PyPI Trusted Publishing
# for this repo (workflow file release.yml), then add a publish job using
# pypa/gh-action-pypi-publish with `permissions: id-token: write`.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::tag v$TAG does not match pyproject version $VER — bump pyproject.toml first"
            exit 1
          fi

      - name: Build + validate sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
