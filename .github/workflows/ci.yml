name: ci

# The 4-way quality cocktail: ruff (lint) + mypy (types) + bandit (security) + pytest.
# Runs on every push/PR to main. All four are blocking.
#
# lint/typecheck/security run through tools/lint-gate.sh, which RATCHETS against
# the counts in .lint-baseline rather than demanding zero. They went red on
# 2026-07-02 and stayed red for three weeks -- a permanently-failing build is one
# nobody reads, which is precisely how the debt accumulated unnoticed. The gate
# fails on any INCREASE, so the pile can only shrink; tools/lint-baseline.sh
# re-records it and refuses to raise a number. pytest stays strictly green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ./tools/lint-gate.sh ruff

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ./tools/lint-gate.sh mypy

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ./tools/lint-gate.sh bandit

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]   # 3.10 enforces the requires-python floor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q
